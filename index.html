<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>A320 MCDU</title>
<link rel="icon" type="image/png" href="favicon-96x96.png" sizes="96x96" />
<link rel="icon" type="image/svg+xml" href="favicon.svg" />
<link rel="shortcut icon" href="favicon.ico" />
<link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png" />
<meta name="apple-mobile-web-app-title" content="A320" />
<link rel="manifest" href="site.webmanifest" />
<style>
@import url('https://fonts.googleapis.com/css2?family=B612+Mono:wght@400;700&display=swap');
:root{--amb:#ff9d00;--cyn:#00ffff;--grn:#00ff00;--wht:#ffffff;--red:#ff4444;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#1a1a1a;color:white;font-family:'B612 Mono',monospace;display:flex;flex-direction:column;align-items:center;padding:20px;user-select:none;}
#mcdu{width:620px;background:#5b6a7a;padding:25px;border-radius:15px;border:4px solid #444;margin-bottom:14px;}
#bezel{background:#080808;display:grid;grid-template-columns:60px 1fr 60px;grid-template-rows:45px repeat(6,60px) 45px;padding:10px;border-radius:10px;}
#screen-bg{grid-column:2;grid-row:1/span 8;background:#000;border:2px solid #333;height:100%;z-index:1;}
#title{grid-column:2;grid-row:1;text-align:center;color:white;z-index:2;font-size:18px;display:flex;align-items:center;justify-content:center;gap:8px;}
#live-dot{width:8px;height:8px;border-radius:50%;background:#333;flex-shrink:0;transition:background .3s;}
#live-dot.on{background:var(--grn);box-shadow:0 0 6px var(--grn);}
#scratchpad{grid-column:2;grid-row:8;z-index:2;font-size:19px;padding:0 12px;display:flex;align-items:center;border-top:1px solid #222;min-height:45px;overflow:hidden;}
#scratchpad.err{color:var(--amb);}
#scratchpad.ok{color:white;}
.lsk{width:48px;height:32px;background:#222;border:1px solid #000;cursor:pointer;border-radius:4px;z-index:2;justify-self:center;align-self:center;}
.lsk:active{background:#444;}
.dc{grid-column:2;z-index:2;display:flex;flex-direction:column;justify-content:center;height:60px;padding:0 12px;}
.lr{display:flex;justify-content:space-between;font-size:11px;color:#aaa;line-height:1;margin-bottom:2px;}
.vr{display:flex;justify-content:space-between;font-size:21px;font-weight:bold;line-height:1;overflow:hidden;}
.vr span{overflow:hidden;white-space:nowrap;}
.mode-row{display:grid;grid-template-columns:repeat(6,1fr);gap:6px;margin:18px 0;}
.lower{display:grid;grid-template-columns:180px 1fr;gap:20px;}
.btn{background:#1a1a1a;border:1px solid #000;color:white;padding:12px 2px;border-radius:4px;font-size:10px;font-weight:bold;cursor:pointer;box-shadow:0 3px 0 #000;font-family:'B612 Mono',monospace;}
.btn:active{transform:translateY(2px);box-shadow:none;}
.btn-key{font-size:18px;padding:14px 0;}
.arrow-pad{display:grid;grid-template-columns:repeat(2,1fr);gap:6px;margin-bottom:6px;}
.num-pad{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;}
.alpha-pad{display:grid;grid-template-columns:repeat(5,1fr);gap:5px;}
.panel{width:620px;background:#242424;padding:14px;border-radius:10px;border:1.5px solid #444;display:flex;flex-direction:column;gap:9px;align-items:center;margin-bottom:10px;}
.panel-title{font-size:10px;color:#666;letter-spacing:2px;align-self:flex-start;}
.prow{display:flex;gap:10px;align-items:center;justify-content:center;width:100%;}
.panel input{background:#000;color:var(--grn);border:1px solid #444;padding:8px;font-family:'B612 Mono';outline:none;font-size:14px;flex:1;border-radius:3px;}
.pbtn{background:#5b6a7a;color:white;border:none;padding:9px 14px;cursor:pointer;border-radius:4px;font-weight:bold;font-family:'B612 Mono';white-space:nowrap;font-size:13px;}
.pbtn:hover{background:#6e7f91;}
.pbtn.live{background:#1a6b1a;}
.pstat{font-size:11px;color:#666;text-align:center;}
/* BRT slider */
#brt-bar{width:100%;height:6px;background:#333;border-radius:3px;cursor:pointer;position:relative;}
#brt-fill{height:100%;background:var(--grn);border-radius:3px;width:80%;}
/* colour classes */
.G{color:var(--grn);}.C{color:var(--cyn);}.A{color:var(--amb);}.W{color:var(--wht);}.X{color:#444;}.R{color:var(--red);}
</style>
</head>
<body>

<div id="mcdu">
 <div id="bezel">
  <div id="screen-bg"></div>
  <div id="title"><span id="live-dot"></span><span id="ttl">MCDU MENU</span></div>
  <button class="lsk" onclick="lsk('L1')" style="grid-row:2;grid-column:1;"></button>
  <div id="r1" class="dc" style="grid-row:2;"></div>
  <button class="lsk" onclick="lsk('R1')" style="grid-row:2;grid-column:3;"></button>
  <button class="lsk" onclick="lsk('L2')" style="grid-row:3;grid-column:1;"></button>
  <div id="r2" class="dc" style="grid-row:3;"></div>
  <button class="lsk" onclick="lsk('R2')" style="grid-row:3;grid-column:3;"></button>
  <button class="lsk" onclick="lsk('L3')" style="grid-row:4;grid-column:1;"></button>
  <div id="r3" class="dc" style="grid-row:4;"></div>
  <button class="lsk" onclick="lsk('R3')" style="grid-row:4;grid-column:3;"></button>
  <button class="lsk" onclick="lsk('L4')" style="grid-row:5;grid-column:1;"></button>
  <div id="r4" class="dc" style="grid-row:5;"></div>
  <button class="lsk" onclick="lsk('R4')" style="grid-row:5;grid-column:3;"></button>
  <button class="lsk" onclick="lsk('L5')" style="grid-row:6;grid-column:1;"></button>
  <div id="r5" class="dc" style="grid-row:6;"></div>
  <button class="lsk" onclick="lsk('R5')" style="grid-row:6;grid-column:3;"></button>
  <button class="lsk" onclick="lsk('L6')" style="grid-row:7;grid-column:1;"></button>
  <div id="r6" class="dc" style="grid-row:7;"></div>
  <button class="lsk" onclick="lsk('R6')" style="grid-row:7;grid-column:3;"></button>
  <div id="sp" class="ok"></div>
 </div>

 <div class="mode-row">
  <button class="btn" onclick="go('DIR')">DIR</button>
  <button class="btn" onclick="go('PROG')">PROG</button>
  <button class="btn" onclick="go('PERF')">PERF</button>
  <button class="btn" onclick="go('INIT')">INIT</button>
  <button class="btn" onclick="go('DATA')">DATA</button>
  <button class="btn" onclick="go('BRT')">BRT</button>
  <button class="btn" onclick="go('FPLN')">F-PLN</button>
  <button class="btn" onclick="go('RAD')">RAD</button>
  <button class="btn" onclick="go('FUEL')">FUEL</button>
  <button class="btn" onclick="go('SEC')">SEC</button>
  <button class="btn" onclick="go('ATC')">ATC</button>
  <button class="btn" onclick="go('MENU')">MENU</button>
 </div>

 <div class="lower">
  <div>
   <div class="arrow-pad">
    <button class="btn btn-key" onclick="key('↑')">↑</button>
    <button class="btn btn-key" onclick="key('↓')">↓</button>
    <button class="btn btn-key" onclick="key('←')">←</button>
    <button class="btn btn-key" onclick="key('→')">→</button>
   </div>
   <div class="num-pad">
    <button class="btn btn-key" onclick="key('1')">1</button>
    <button class="btn btn-key" onclick="key('2')">2</button>
    <button class="btn btn-key" onclick="key('3')">3</button>
    <button class="btn btn-key" onclick="key('4')">4</button>
    <button class="btn btn-key" onclick="key('5')">5</button>
    <button class="btn btn-key" onclick="key('6')">6</button>
    <button class="btn btn-key" onclick="key('7')">7</button>
    <button class="btn btn-key" onclick="key('8')">8</button>
    <button class="btn btn-key" onclick="key('9')">9</button>
    <button class="btn btn-key" onclick="key('.')">.</button>
    <button class="btn btn-key" onclick="key('0')">0</button>
    <button class="btn btn-key" onclick="key('/')">/</button>
   </div>
  </div>
  <div class="alpha-pad" id="alpha-btns"></div>
 </div>
</div>

<!-- SimBrief panel -->
<div class="panel">
 <div class="panel-title">SIMBRIEF DATALINK</div>
 <div class="prow">
  <input id="sb-in" placeholder="SimBrief username or pilot ID" autocomplete="off">
  <button class="pbtn" onclick="sbUplink()">UPLINK</button>
 </div>
 <div class="pstat" id="sb-st">Enter your SimBrief username or numeric pilot ID</div>
</div>

<!-- Live companion panel -->
<div class="panel">
 <div class="panel-title">LIVE SIM — PC ONLY (MSFS 2020/2024)</div>
 <div class="prow">
  <input id="ws-in" placeholder="PC local IP  e.g. 192.168.1.50" autocomplete="off">
  <button class="pbtn" id="ws-btn" onclick="wsToggle()">CONNECT</button>
 </div>
 <div class="pstat" id="ws-st">Xbox/console users: SimBrief uplink only — live connection not available</div>
</div>

<script>
// ═══════════════════════════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════════════════════════
let pad='', padErr=false;
let page='MENU';
let brt=80; // brightness 0-100

const FL = {  // flight data
  fromTo:'____/____', altn:'----', fltNo:'______', costIdx:'---',
  crzAlt:'_____', tropo:'36090', squawk:'----',
  perf:{ v1:'---',vr:'---',v2:'---',flaps:'--',ths:'UP0.0',flex:'---',thrRed:'1500',thrAcc:'1500',transAlt:'18000' },
  fuel:{ block:'---.-',trip:'---.-',altn:'---.-',rteRsv:'---.-',rsvPct:'5.0',final:'---.-',extra:'---.-',taxi:'---.-',zfw:'---.-',tow:'---.-',lw:'---.-' },
  route:[], // array of waypoint strings from SimBrief
  atsu:null,
  aircraft:'A320', engine:'CFM56-5B4', navdb:'2501/2502',
};

const dirState = { wpt:'', confirmed:false };
let fpPage=0; // F-PLN scroll page

// live sim
let live=null, ws=null, wsOk=false;

// ATSU
let atsuMsg='', atsuWxMsg='';

// ═══════════════════════════════════════════════════════════════════════════
// SCRATCHPAD
// ═══════════════════════════════════════════════════════════════════════════
const CLEAR_ON_NEXT = ['FORMAT ERROR','OUT OF RANGE','NOT ALLOWED','ENTRY DELETED'];

function key(v){
  if(padErr||CLEAR_ON_NEXT.includes(pad)){pad='';padErr=false;}
  pad+=v; draw();
}

function clr(){
  if(pad===''){pad='CLR';}
  else if(pad==='CLR'){pad='';}
  else{pad=pad.slice(0,-1);}
  padErr=false; draw();
}

function err(msg){ pad=msg; padErr=true; draw(); }

// ═══════════════════════════════════════════════════════════════════════════
// VALIDATION RULES (real FCOM formats)
// ═══════════════════════════════════════════════════════════════════════════
const V = {
  fromTo: v => /^[A-Z0-9]{3,4}\/[A-Z0-9]{3,4}$/.test(v),
  icao:   v => /^[A-Z0-9]{3,4}$/.test(v),
  fltNo:  v => /^[A-Z]{2,3}[0-9]{1,4}[A-Z]?$/.test(v),
  costIdx:v => /^\d{1,3}$/.test(v) && +v>=0 && +v<=999,
  fl:     v => (/^FL\d{2,3}$/i.test(v)||/^\d{3,5}$/.test(v)) && (() => {const n=+v.replace(/FL/i,''); return n>=100&&n<=450;})(),
  tropo:  v => /^\d{4,5}$/.test(v) && +v>=25000 && +v<=60000,
  vspd:   v => /^\d{3}$/.test(v) && +v>=100 && +v<=199,
  flaps:  v => ['1','1F','2','3'].includes(v.toUpperCase()),
  thsVal: v => { const m=v.match(/^(\d|1F|2|3)\/(UP|DN)(\d(\.\d)?)$/i); return !!m && +m[3]<=4.0; },
  flex:   v => /^\d{1,2}$/.test(v) && +v>=0 && +v<=99,
  alt4:   v => /^\d{3,5}$/.test(v) && +v>=400 && +v<=15000,
  transAlt: v => /^\d{4,5}$/.test(v) && +v>=3000 && +v<=20000,
  waypoint: v => /^[A-Z0-9]{2,7}$/.test(v),
  zfw:    v => /^\d{2}(\.\d)?$/.test(v) && +v>=30 && +v<=75,
  squawk: v => /^[0-7]{4}$/.test(v),
};

function validate(rule,v){
  if(!pad||pad==='CLR') return false;
  return V[rule] ? V[rule](v.toUpperCase()) : true;
}

// ═══════════════════════════════════════════════════════════════════════════
// PAGE NAVIGATION
// ═══════════════════════════════════════════════════════════════════════════
function go(p){ page=p; if(p==='FPLN') fpPage=0; draw(); }

// ═══════════════════════════════════════════════════════════════════════════
// LSK HANDLER
// ═══════════════════════════════════════════════════════════════════════════
function lsk(id){
  const p=pad, up=p.toUpperCase();

  // — MENU —
  if(page==='MENU'){
    if(id==='L1') go('INIT');
    if(id==='L2') go('ATSU');
    if(id==='L3') go('AIDS');
    if(id==='L4') go('CFDS');
    if(id==='L6') go('SATCOM');
    return;
  }

  // — INIT —
  if(page==='INIT'){
    if(id==='R1'){ if(!p){return;} if(!V.fromTo(up)){err('FORMAT ERROR');return;} FL.fromTo=up;pad=''; }
    if(id==='L3'){ if(!p){return;} if(!V.fltNo(up)){err('FORMAT ERROR');return;} FL.fltNo=up;pad=''; }
    if(id==='L4'){ if(!p){return;} if(!V.costIdx(up)){err('OUT OF RANGE');return;} FL.costIdx=up;pad=''; }
    if(id==='L5'){ if(!p){return;} const v=up.replace('FL',''); if(!V.fl(up)){err('FORMAT ERROR');return;} FL.crzAlt='FL'+v.replace('FL','');pad=''; }
    if(id==='L6'){ if(!p){return;} if(!V.tropo(up)){err('OUT OF RANGE');return;} FL.tropo=up;pad=''; }
    if(id==='R2'){ if(!p){return;} if(!V.icao(up)){err('FORMAT ERROR');return;} FL.altn=up;pad=''; }
    draw(); return;
  }

  // — PERF —
  if(page==='PERF'){
    if(id==='L1'){ if(!p){return;} if(!V.vspd(up)){err('FORMAT ERROR');return;} if(+up>+FL.perf.vr&&FL.perf.vr!=='---'){err('OUT OF RANGE');return;} FL.perf.v1=up;pad=''; }
    if(id==='L2'){ if(!p){return;} if(!V.vspd(up)){err('FORMAT ERROR');return;} FL.perf.vr=up;pad=''; }
    if(id==='L3'){ if(!p){return;} if(!V.vspd(up)){err('FORMAT ERROR');return;} if(+up<+FL.perf.vr&&FL.perf.vr!=='---'){err('OUT OF RANGE');return;} FL.perf.v2=up;pad=''; }
    if(id==='R3'){ if(!p){return;}
      // FLAPS/THS: accept "2/UP0.5" or just "2" or "1F/DN0.2"
      const ths=up.match(/^(1F|1|2|3)\/(UP|DN)(\d(\.\d)?)$/i);
      const flOnly=up.match(/^(1F|1|2|3)$/i);
      if(ths){FL.perf.flaps=ths[1].toUpperCase();FL.perf.ths=ths[2].toUpperCase()+ths[3];pad='';}
      else if(flOnly){FL.perf.flaps=flOnly[1].toUpperCase();pad='';}
      else{err('FORMAT ERROR');return;}
    }
    if(id==='R4'){ if(!p){return;} if(!V.flex(up)){err('OUT OF RANGE');return;} FL.perf.flex=up+'°';pad=''; }
    if(id==='L4'){ if(!p){return;} if(!V.alt4(up)){err('OUT OF RANGE');return;} FL.perf.thrRed=up;pad=''; }
    if(id==='L5'){ if(!p){return;} if(!V.alt4(up)){err('OUT OF RANGE');return;} if(+up<+FL.perf.thrRed){err('OUT OF RANGE');return;} FL.perf.thrAcc=up;pad=''; }
    if(id==='R5'){ if(!p){return;} if(!V.transAlt(up)){err('OUT OF RANGE');return;} FL.perf.transAlt=up;pad=''; }
    draw(); return;
  }

  // — DIR —
  if(page==='DIR'){
    if(id==='L1'){
      if(!p){dirState.wpt='';dirState.confirmed=false;draw();return;}
      if(!V.waypoint(up)){err('FORMAT ERROR');return;}
      dirState.wpt=up;dirState.confirmed=false;pad='';draw();return;
    }
    // Select from route list (L2-L6)
    const listIdx={'L2':0,'L3':1,'L4':2,'L5':3,'L6':4};
    if(listIdx[id]!==undefined){
      const visible=FL.route.slice(0,5);
      const wpt=visible[listIdx[id]];
      if(wpt){dirState.wpt=wpt;dirState.confirmed=false;draw();return;}
    }
    if(id==='R5'&&dirState.wpt){dirState.confirmed=false;dirState.wpt='';draw();return;} // ERASE
    if(id==='R6'&&dirState.wpt){dirState.confirmed=true;draw();return;} // DIRECT*
    draw(); return;
  }

  // — F-PLN —
  if(page==='FPLN'){
    if(id==='R6'&&pad==='CLR'){ pad=''; draw(); return; }
    if(id==='L6'){ fpPage=Math.max(0,fpPage-1);draw();return; }
    if(id==='R5'){ fpPage=fpPage+1;draw();return; }
    draw(); return;
  }

  // — DATA subpages —
  if(page==='DATA'){ if(id==='L1') go('DATA_STATUS'); if(id==='L2') go('DATA_POS'); if(id==='L3') go('DATA_GPS'); if(id==='R6') go('MENU'); draw();return; }
  if(['DATA_STATUS','DATA_POS','DATA_GPS'].includes(page)){ if(id==='R6') go('DATA');draw();return; }

  // — ATSU tree —
  if(page==='ATSU'){ if(id==='L1') go('ATSU_AOC'); if(id==='L2') go('ATSU_ATC'); if(id==='R6') go('MENU'); draw();return; }
  if(page==='ATSU_AOC'){
    if(id==='L1'){atsuRequestOFP();return;}
    if(id==='L2'){atsuRequestWX();return;}
    if(id==='R6') go('ATSU');draw();return;
  }
  if(page==='ATSU_ATC'){ if(id==='R6') go('ATSU');draw();return; }

  // — AIDS —
  if(page==='AIDS'){ if(id==='L1') go('AIDS_ENG'); if(id==='L2') go('AIDS_APU'); if(id==='R6') go('MENU'); draw();return; }
  if(['AIDS_ENG','AIDS_APU'].includes(page)){ if(id==='R6') go('AIDS');draw();return; }

  // — CFDS —
  if(page==='CFDS'){ if(id==='L1') go('CFDS_LLR'); if(id==='L2') go('CFDS_PFR'); if(id==='L3') go('CFDS_SYS'); if(id==='R6') go('MENU'); draw();return; }
  if(['CFDS_LLR','CFDS_PFR','CFDS_SYS'].includes(page)){ if(id==='R6') go('CFDS');draw();return; }

  // — SATCOM —
  if(page==='SATCOM'){ if(id==='R6') go('MENU');draw();return; }

  // — BRT —
  if(page==='BRT'){
    if(id==='L3'){ brt=Math.min(100,brt+10); applyBrt(); }
    if(id==='L4'){ brt=Math.max(10,brt-10); applyBrt(); }
    draw(); return;
  }

  draw();
}

// ═══════════════════════════════════════════════════════════════════════════
// BRIGHTNESS
// ═══════════════════════════════════════════════════════════════════════════
function applyBrt(){
  const b=brt/100;
  document.getElementById('screen-bg').style.background=`rgba(0,0,0,${1-b*0.3})`;
  document.querySelectorAll('.G,.C,.A,.W,.vr span,.lr span').forEach(el=>{el.style.opacity=0.6+b*0.4;});
}

// ═══════════════════════════════════════════════════════════════════════════
// SIMBRIEF UPLINK
// ═══════════════════════════════════════════════════════════════════════════
function setSbSt(m,c){const e=document.getElementById('sb-st');e.textContent=m;e.style.color=c||'#666';}

async function sbUplink(){
  const raw=document.getElementById('sb-in').value.trim();
  if(!raw){setSbSt('Enter a SimBrief username or pilot ID','var(--amb)');return;}
  pad='UPLINKING…';draw();setSbSt('Contacting SimBrief…','var(--cyn)');
  const isNum=/^\d+$/.test(raw);
  const url=`https://www.simbrief.com/api/xml.fetcher.php?${isNum?'userid':'username'}=${raw}&json=1`;
  try{
    const r=await fetch(url);
    if(!r.ok) throw new Error('HTTP '+r.status);
    const d=await r.json();
    if(d.fetch&&d.fetch.status==='Error'){pad='NO OFP';setSbSt('No flight plan found for this user','var(--amb)');draw();return;}
    if(!d.origin||!d.destination) throw new Error('Bad data');

    FL.fromTo=`${d.origin.icao_code}/${d.destination.icao_code}`.toUpperCase();
    FL.altn  =(d.alternate&&d.alternate.icao_code)||'----';
    FL.fltNo =(d.general.icao_airline+d.general.flight_number).toUpperCase();
    FL.costIdx=String(d.general.costindex??d.general.cost_index??'---');
    const flNum=Math.round(parseInt(d.general.initial_altitude)/100);
    FL.crzAlt='FL'+flNum;
    FL.aircraft=(d.aircraft&&d.aircraft.icaocode)||'A320';
    FL.engine=(d.aircraft&&d.aircraft.name)||'CFM56-5B4';

    const kg=v=>v?(parseInt(v)/1000).toFixed(1):'---.-';
    const f=d.fuel||{};
    FL.fuel.block =kg(f.plan_ramp);  FL.fuel.trip  =kg(f.plan_trip);
    FL.fuel.altn  =kg(f.plan_altn);  FL.fuel.rteRsv=kg(f.plan_contingency);
    FL.fuel.rsvPct=f.cont_rule?parseFloat(f.cont_rule).toFixed(1):'5.0';
    FL.fuel.final =kg(f.plan_reserve);FL.fuel.extra =kg(f.plan_extra);
    FL.fuel.taxi  =kg(f.plan_taxi);
    const w=d.weights||{};
    FL.fuel.zfw=kg(w.est_zfw); FL.fuel.tow=kg(w.est_tow); FL.fuel.lw=kg(w.est_ldw);

    // Route waypoints from SimBrief route string
    if(d.general&&d.general.route){
      FL.route=d.general.route.trim().split(/\s+/).filter(w=>/^[A-Z0-9]{2,7}$/.test(w));
    }

    // ATSU extra fields
    FL.atsu={
      depIcao:d.origin.icao_code, arrIcao:d.destination.icao_code,
      altnIcao:(d.alternate&&d.alternate.icao_code)||'----',
      depTime:(d.times&&d.times.sched_out)||'----',
      arrTime:(d.times&&d.times.sched_in)||'----',
      route:d.general.route||'', aircraft:FL.aircraft,
    };

    pad='UPLINK OK'; setSbSt(`✓ ${FL.fltNo}  ${FL.fromTo}  ${FL.crzAlt}`,'var(--grn)');
  }catch(e){
    pad='UPLINK ERR'; setSbSt('Error: '+(e.message.includes('fetch')?'Network error':e.message),'var(--red)');
  }
  draw();
}

// WEBSOCKET LIVE

function setWsSt(m,c){const e=document.getElementById('ws-st');e.textContent=m;e.style.color=c||'#666';}

function wsToggle(){wsOk?wsDc():wsCon();}

function wsCon(){
  const ip=document.getElementById('ws-in').value.trim();
  if(!ip){setWsSt('Enter your PC IP address','var(--amb)');return;}
  setWsSt('Connecting…','var(--cyn)');
  try{ws=new WebSocket(`ws://${ip}:8765`);}catch(e){setWsSt('Invalid address','var(--red)');return;}
  ws.onopen=()=>{
    wsOk=true;
    document.getElementById('ws-btn').textContent='DISCONNECT';
    document.getElementById('ws-btn').classList.add('live');
    document.getElementById('live-dot').classList.add('on');
    setWsSt(`Connected — live data active`,'var(--grn)');draw();
  };
  ws.onmessage=e=>{try{const d=JSON.parse(e.data);live=d.connected?d:null;if(['PROG','FUEL','AIDS_ENG'].includes(page))draw();}catch{}};
  ws.onclose=()=>{wsOk=false;live=null;document.getElementById('ws-btn').textContent='CONNECT';document.getElementById('ws-btn').classList.remove('live');document.getElementById('live-dot').classList.remove('on');setWsSt('Disconnected','var(--red)');draw();};
  ws.onerror=()=>setWsSt(`Cannot reach ${ip}:8765 — companion running?`,'var(--red)');
}
function wsDc(){if(ws)ws.close();}

async function atsuRequestOFP(){
  const raw=document.getElementById('sb-in').value.trim();
  if(!raw){atsuMsg='NO PILOT ID';draw();return;}
  atsuMsg='REQUESTING…';draw();
  // reuse main uplink logic
  await sbUplink();
  atsuMsg=pad==='UPLINK OK'?'OFP LOADED':'UPLINK FAIL';
  draw();
}

async function atsuRequestWX(){
  const dep=FL.atsu?FL.atsu.depIcao:FL.fromTo.split('/')[0];
  if(!dep||dep==='____'){atsuWxMsg='NO DEP ARPT';draw();return;}
  atsuWxMsg='FETCHING WX…';draw();
  try{
    const r=await fetch(`https://aviationweather.gov/api/data/metar?ids=${dep}&format=json`);
    const d=await r.json();
    atsuWxMsg=(d&&d[0]&&d[0].rawOb)||'NO WX DATA';
  }catch{atsuWxMsg='WX UNAVAIL';}
  draw();
}

function R(n,l1,l2,v1,v2,c1,c2){

    `<div class="lr"><span>${l1}</span><span>${l2}</span></div>`+
    `<div class="vr"><span class="${c1}">${v1}</span><span class="${c2}">${v2}</span></div>`;

// ═══════════════════════════════════════════════════════════════════════════
// BRT CLICK ON BAR
// ═══════════════════════════════════════════════════════════════════════════
function brtClick(e){
  const bar=document.getElementById('brt-bar');
  const rect=bar.getBoundingClientRect();
  brt=Math.round(((e.clientX-rect.left)/rect.width)*100);
  brt=Math.max(10,Math.min(100,brt));
  applyBrt(); draw();
}

// KEYBOARD
// ═══════════════════════════════════════════════════════════════════════════
const al=document.getElementById('alpha-btns');
'ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('').forEach(x=>{
  const b=document.createElement('button');b.className='btn btn-key';b.textContent=x;
  b.onclick=()=>key(x);al.appendChild(b);
});
[['SP',' '],['CLR','']].forEach(([lbl])=>{
  const b=document.createElement('button');b.className='btn btn-key';b.textContent=lbl;
  b.onclick=()=>{if(lbl==='CLR')clr();else key(' ');};al.appendChild(b);
});

// Physical keyboard support
document.addEventListener('keydown',e=>{
  if(e.target.tagName==='INPUT') return;
  if(e.key==='Backspace'){clr();e.preventDefault();}
  else if(e.key==='Enter'){ /* no-op */ }
  else if(/^[a-zA-Z0-9\/\.\+\-]$/.test(e.key)) key(e.key.toUpperCase());
});

draw();
