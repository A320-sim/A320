<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>A320 MCDU - GitHub Edition</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=B612+Mono:wght@700&display=swap');
        :root { --amb: #ff9d00; --cyn: #00ffff; --grn: #00ff00; --wht: #ffffff; }
        body { background: #1a1a1a; color: white; font-family: 'B612 Mono', monospace; display: flex; flex-direction: column; align-items: center; padding: 20px; user-select: none; }
        #mcdu { width: 620px; background: #5b6a7a; padding: 25px; border-radius: 15px; border: 4px solid #444; margin-bottom: 20px; }
        #bezel { background: #080808; display: grid; grid-template-columns: 60px 1fr 60px; grid-template-rows: 45px repeat(6, 60px) 45px; padding: 10px; border-radius: 10px; }
        #screen-bg { grid-column: 2; grid-row: 1 / span 8; background: #000; border: 2px solid #333; height: 100%; z-index: 1; }
        #title { grid-column: 2; grid-row: 1; text-align: center; color: white; z-index: 2; font-size: 18px; display: flex; align-items: center; justify-content: center; }
        #scratchpad { grid-column: 2; grid-row: 8; color: white; z-index: 2; font-size: 20px; padding: 0 12px; display: flex; align-items: center; border-top: 1px solid #222; min-height: 45px; }
        .lsk { width: 48px; height: 32px; background: #222; border: 1px solid #000; cursor: pointer; border-radius: 4px; z-index: 2; justify-self: center; align-self: center; }
        .lsk:active { background: #444; }
        .data-cell { grid-column: 2; z-index: 2; display: flex; flex-direction: column; justify-content: center; height: 60px; padding: 0 12px; box-sizing: border-box; }
        .label-row { display: flex; justify-content: space-between; font-size: 11px; color: #ccc; line-height: 1; margin-bottom: 2px; }
        .val-row { display: flex; justify-content: space-between; font-size: 22px; font-weight: bold; line-height: 1; }
        .mode-row { display: grid; grid-template-columns: repeat(6, 1fr); gap: 6px; margin: 20px 0; }
        .lower { display: grid; grid-template-columns: 180px 1fr; gap: 20px; }
        .btn { background: #1a1a1a; border: 1px solid #000; color: white; padding: 12px 2px; border-radius: 4px; font-size: 10px; font-weight: bold; cursor: pointer; box-shadow: 0 3px 0 #000; }
        .btn:active { transform: translateY(2px); box-shadow: none; }
        .btn-key { font-size: 18px; padding: 15px 0; }
        .num-pad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; }
        .alpha-pad { display: grid; grid-template-columns: repeat(5, 1fr); gap: 5px; }
        #external-input { width: 620px; background: #333; padding: 15px; border-radius: 10px; border: 2px solid #555; display: flex; gap: 10px; align-items: center; justify-content: center; }
        #sb-id-input { background: #000; color: var(--grn); border: 1px solid #555; padding: 8px; font-family: 'B612 Mono'; width: 150px; outline: none; }
        #sb-btn { background: #5b6a7a; color: white; border: none; padding: 10px; cursor: pointer; border-radius: 4px; font-weight: bold; }
        .G { color: var(--grn); } .C { color: var(--cyn); } .A { color: var(--amb); } .W { color: var(--wht); }
    </style>
</head>
<body>

<div id="mcdu">
    <div id="bezel">
        <div id="screen-bg"></div>
        <div id="title">MCDU MENU</div>
        
        <button class="lsk" onclick="pressLSK('L1')" style="grid-row: 2; grid-column: 1;"></button>
        <div id="row1" class="data-cell" style="grid-row: 2;"></div>
        <button class="lsk" onclick="pressLSK('R1')" style="grid-row: 2; grid-column: 3;"></button>
        <button class="lsk" onclick="pressLSK('L2')" style="grid-row: 3; grid-column: 1;"></button>
        <div id="row2" class="data-cell" style="grid-row: 3;"></div>
        <button class="lsk" onclick="pressLSK('R2')" style="grid-row: 3; grid-column: 3;"></button>
        <button class="lsk" onclick="pressLSK('L3')" style="grid-row: 4; grid-column: 1;"></button>
        <div id="row3" class="data-cell" style="grid-row: 4;"></div>
        <button class="lsk" onclick="pressLSK('R3')" style="grid-row: 4; grid-column: 3;"></button>
        <button class="lsk" onclick="pressLSK('L4')" style="grid-row: 5; grid-column: 1;"></button>
        <div id="row4" class="data-cell" style="grid-row: 5;"></div>
        <button class="lsk" onclick="pressLSK('R4')" style="grid-row: 5; grid-column: 3;"></button>
        <button class="lsk" onclick="pressLSK('L5')" style="grid-row: 6; grid-column: 1;"></button>
        <div id="row5" class="data-cell" style="grid-row: 6;"></div>
        <button class="lsk" onclick="pressLSK('R5')" style="grid-row: 6; grid-column: 3;"></button>
        <button class="lsk" onclick="pressLSK('L6')" style="grid-row: 7; grid-column: 1;"></button>
        <div id="row6" class="data-cell" style="grid-row: 7;"></div>
        <button class="lsk" onclick="pressLSK('R6')" style="grid-row: 7; grid-column: 3;"></button>
        <div id="scratchpad"></div>
    </div>

    <div class="mode-row">
        <button class="btn" onclick="setPage('DIR')">DIR</button>
        <button class="btn" onclick="setPage('PROG')">PROG</button>
        <button class="btn" onclick="setPage('PERF')">PERF</button>
        <button class="btn" onclick="setPage('INIT')">INIT</button>
        <button class="btn" onclick="setPage('DATA')">DATA</button>
        <button class="btn">BRT</button>
        <button class="btn">F-PLN</button>
        <button class="btn">RAD</button>
        <button class="btn">FUEL</button>
        <button class="btn">SEC</button>
        <button class="btn">ATC</button>
        <button class="btn" onclick="setPage('MENU')">MENU</button>
    </div>

    <div class="lower">
        <div>
            <div class="num-pad">
                <button class="btn btn-key" onclick="key('1')">1</button><button class="btn btn-key" onclick="key('2')">2</button><button class="btn btn-key" onclick="key('3')">3</button>
                <button class="btn btn-key" onclick="key('4')">4</button><button class="btn btn-key" onclick="key('5')">5</button><button class="btn btn-key" onclick="key('6')">6</button>
                <button class="btn btn-key" onclick="key('7')">7</button><button class="btn btn-key" onclick="key('8')">8</button><button class="btn btn-key" onclick="key('9')">9</button>
                <button class="btn btn-key" onclick="key('.')">.</button><button class="btn btn-key" onclick="key('0')">0</button><button class="btn btn-key" onclick="key('/')">/</button>
            </div>
        </div>
        <div class="alpha-pad" id="alpha-btns"></div>
    </div>
</div>

<div id="external-input">
    <input type="text" id="sb-id-input" placeholder="SIMBRIEF ID">
    <button id="sb-btn" onclick="directUplink()">CONNECT & UPLINK</button>
</div>

<script>
    let pad = "", page = "MENU";
    let flight = { fromTo: "____/____", fltNo: "______", costIdx: "---", crzAlt: "_____/---°" };

    function key(v) { 
        if (["SUCCESS", "ERROR", "403 BLOCKED", "UPLINKING..."].includes(pad)) pad = "";
        pad += v; draw(); 
    }
    
    function setPage(p) { page = p; draw(); }

    async function directUplink() {
        const id = document.getElementById('sb-id-input').value;
        if(!id) return;
        pad = "UPLINKING..."; draw();
        
        try {
            // Updated to use a cleaner proxy fetch logic
            const sbUrl = `https://www.simbrief.com/api/xml.fetcher.php?userid=${id}&json=1`;
            const response = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(sbUrl)}`);
            const data = await response.json();
            const d = JSON.parse(data.contents);
            
            if(!d.origin) throw new Error();

            flight.fromTo = `${d.origin.icao_code}/${d.destination.icao_code}`.toUpperCase();
            flight.fltNo = `${d.general.icao_airline}${d.general.flight_number}`.toUpperCase();
            flight.costIdx = d.general.cost_index;
            flight.crzAlt = `FL${Math.round(d.general.initial_altitude/100)}/---°`;
            pad = "SUCCESS";
        } catch(e) { 
            pad = "403 BLOCKED"; 
            console.error("Uplink failed. If on GitHub, try a CORS extension.");
        }
        draw();
    }

    function pressLSK(id) {
        if (page === 'MENU' && id === 'L1') setPage('INIT');
        if (page === 'INIT') {
            if (!pad) return;
            if (id === 'R1') flight.fromTo = pad;
            if (id === 'L3') flight.fltNo = pad;
            if (id === 'L4') flight.costIdx = pad;
            if (id === 'L5') flight.crzAlt = pad;
            pad = "";
        }
        draw();
    }

    function draw() {
        document.getElementById('title').innerText = (page === "MENU") ? "MCDU MENU" : page + " A";
        document.getElementById('scratchpad').innerText = pad;

        if (page === "MENU") {
            setRow(1, "", "", "<FMGC", "REQ>", "G", "W");
            setRow(2, "", "", "<ATSU", "", "G", "");
            setRow(3, "", "", "<AIDS", "", "G", "");
            setRow(4, "", "", "<CFDS", "", "G", "");
            setRow(6, "", "", "<SATCOM", "", "G", "");
        } else if (page === "INIT") {
            setRow(1, "CO RTE", "FROM/TO", "NONE", flight.fromTo, "W", "C");
            setRow(2, "ALTN/CO RTE", "INIT", "NONE", "REQUEST*", "W", "A");
            setRow(3, "FLT NBR", "", flight.fltNo, "", "C", "");
            setRow(4, "COST INDEX", "", flight.costIdx, "", "C", "");
            setRow(5, "CRZ FL/TEMP", "", flight.crzAlt, "", "C", "");
            setRow(6, "TROPO", "", "36090", "", "W", "");
        } else {
            for(let i=1;i<=6;i++) setRow(i,"","","","","","");
            setRow(3, "", "PAGE UNDER", "", "CONSTRUCTION", "", "A");
        }
    }

    function setRow(num, l1, l2, v1, v2, c1, c2) {
        document.getElementById('row' + num).innerHTML = `
            <div class="label-row"><span>${l1}</span><span>${l2}</span></div>
            <div class="val-row"><span class="${c1}">${v1}</span><span class="${c2}">${v2}</span></div>
        `;
    }

    const al = document.getElementById('alpha-btns');
    "ABCDEFGHIJKLMNOPQRSTUVWXYZ".split('').forEach(x => {
        let b = document.createElement('button'); b.className = "btn btn-key"; b.innerText = x;
        b.onclick = () => key(x); al.appendChild(b);
    });
    
    [["SP", " "], ["CLR", ""]].forEach(([label, val]) => {
        let b = document.createElement('button'); b.className = "btn btn-key"; b.innerText = label;
        b.onclick = () => { if(label === 'CLR') pad = ""; else key(val); draw(); }; 
        al.appendChild(b);
    });

    draw();
</script>
</body>
</html>
