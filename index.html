<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>A320 MCDU</title>
    <link rel="icon" type="image/png" href="favicon-96x96.png" sizes="96x96" />
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <link rel="shortcut icon" href="favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-title" content="A320" />
    <link rel="manifest" href="site.webmanifest" />
    <style>
        @import url('https://fonts.googleapis.com/css2?family=B612+Mono:wght@700&display=swap');
        :root { --amb: #ff9d00; --cyn: #00ffff; --grn: #00ff00; --wht: #ffffff; }
        body { background: #1a1a1a; color: white; font-family: 'B612 Mono', monospace; display: flex; flex-direction: column; align-items: center; padding: 20px; user-select: none; }
        #mcdu { width: 620px; background: #5b6a7a; padding: 25px; border-radius: 15px; border: 4px solid #444; margin-bottom: 20px; }
        #bezel { background: #080808; display: grid; grid-template-columns: 60px 1fr 60px; grid-template-rows: 45px repeat(6, 60px) 45px; padding: 10px; border-radius: 10px; }
        #screen-bg { grid-column: 2; grid-row: 1 / span 8; background: #000; border: 2px solid #333; height: 100%; z-index: 1; }
        #title { grid-column: 2; grid-row: 1; text-align: center; color: white; z-index: 2; font-size: 18px; display: flex; align-items: center; justify-content: center; gap: 8px; }
        #live-dot { width: 8px; height: 8px; border-radius: 50%; background: #333; flex-shrink: 0; }
        #live-dot.connected { background: var(--grn); box-shadow: 0 0 6px var(--grn); }
        #scratchpad { grid-column: 2; grid-row: 8; color: white; z-index: 2; font-size: 20px; padding: 0 12px; display: flex; align-items: center; border-top: 1px solid #222; min-height: 45px; }
        .lsk { width: 48px; height: 32px; background: #222; border: 1px solid #000; cursor: pointer; border-radius: 4px; z-index: 2; justify-self: center; align-self: center; }
        .lsk:active { background: #444; }
        .data-cell { grid-column: 2; z-index: 2; display: flex; flex-direction: column; justify-content: center; height: 60px; padding: 0 12px; box-sizing: border-box; }
        .label-row { display: flex; justify-content: space-between; font-size: 11px; color: #ccc; line-height: 1; margin-bottom: 2px; }
        .val-row { display: flex; justify-content: space-between; font-size: 22px; font-weight: bold; line-height: 1; }
        .mode-row { display: grid; grid-template-columns: repeat(6, 1fr); gap: 6px; margin: 20px 0; }
        .lower { display: grid; grid-template-columns: 180px 1fr; gap: 20px; }
        .btn { background: #1a1a1a; border: 1px solid #000; color: white; padding: 12px 2px; border-radius: 4px; font-size: 10px; font-weight: bold; cursor: pointer; box-shadow: 0 3px 0 #000; }
        .btn:active { transform: translateY(2px); box-shadow: none; }
        .btn-key { font-size: 18px; padding: 15px 0; }
        .arrow-pad { display: grid; grid-template-columns: repeat(2, 1fr); gap: 6px; margin-bottom: 6px; }
        .num-pad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; }
        .alpha-pad { display: grid; grid-template-columns: repeat(5, 1fr); gap: 5px; }

        /* External panels */
        .panel { width: 620px; background: #2a2a2a; padding: 15px; border-radius: 10px; border: 2px solid #555; display: flex; flex-direction: column; gap: 10px; align-items: center; margin-bottom: 12px; }
        .panel-title { font-size: 11px; color: #888; letter-spacing: 2px; align-self: flex-start; }
        .panel .row { display: flex; gap: 10px; align-items: center; justify-content: center; width: 100%; }
        .panel input { background: #000; color: var(--grn); border: 1px solid #555; padding: 8px; font-family: 'B612 Mono'; outline: none; font-size: 14px; flex: 1; }
        .panel-btn { background: #5b6a7a; color: white; border: none; padding: 10px 14px; cursor: pointer; border-radius: 4px; font-weight: bold; font-family: 'B612 Mono'; white-space: nowrap; }
        .panel-btn:hover { background: #6e7f91; }
        .panel-btn.active { background: #1a6b1a; }
        .status { font-size: 12px; color: #aaa; text-align: center; }

        /* Live indicator strip */
        #live-strip { width: 620px; display: flex; align-items: center; justify-content: center; gap: 8px; font-size: 11px; color: #555; margin-bottom: 4px; }
        #live-strip.connected { color: var(--grn); }

        .G { color: var(--grn); } .C { color: var(--cyn); } .A { color: var(--amb); } .W { color: var(--wht); } .X { color: #555; }
    </style>
</head>
<body>

<div id="mcdu">
    <div id="bezel">
        <div id="screen-bg"></div>
        <div id="title"><span id="live-dot"></span><span id="title-text">MCDU MENU</span></div>

        <button class="lsk" onclick="pressLSK('L1')" style="grid-row:2;grid-column:1;"></button>
        <div id="row1" class="data-cell" style="grid-row:2;"></div>
        <button class="lsk" onclick="pressLSK('R1')" style="grid-row:2;grid-column:3;"></button>
        <button class="lsk" onclick="pressLSK('L2')" style="grid-row:3;grid-column:1;"></button>
        <div id="row2" class="data-cell" style="grid-row:3;"></div>
        <button class="lsk" onclick="pressLSK('R2')" style="grid-row:3;grid-column:3;"></button>
        <button class="lsk" onclick="pressLSK('L3')" style="grid-row:4;grid-column:1;"></button>
        <div id="row3" class="data-cell" style="grid-row:4;"></div>
        <button class="lsk" onclick="pressLSK('R3')" style="grid-row:4;grid-column:3;"></button>
        <button class="lsk" onclick="pressLSK('L4')" style="grid-row:5;grid-column:1;"></button>
        <div id="row4" class="data-cell" style="grid-row:5;"></div>
        <button class="lsk" onclick="pressLSK('R4')" style="grid-row:5;grid-column:3;"></button>
        <button class="lsk" onclick="pressLSK('L5')" style="grid-row:6;grid-column:1;"></button>
        <div id="row5" class="data-cell" style="grid-row:6;"></div>
        <button class="lsk" onclick="pressLSK('R5')" style="grid-row:6;grid-column:3;"></button>
        <button class="lsk" onclick="pressLSK('L6')" style="grid-row:7;grid-column:1;"></button>
        <div id="row6" class="data-cell" style="grid-row:7;"></div>
        <button class="lsk" onclick="pressLSK('R6')" style="grid-row:7;grid-column:3;"></button>
        <div id="scratchpad"></div>
    </div>

    <div class="mode-row">
        <button class="btn" onclick="setPage('DIR')">DIR</button>
        <button class="btn" onclick="setPage('PROG')">PROG</button>
        <button class="btn" onclick="setPage('PERF')">PERF</button>
        <button class="btn" onclick="setPage('INIT')">INIT</button>
        <button class="btn" onclick="setPage('DATA')">DATA</button>
        <button class="btn">BRT</button>
        <button class="btn">F-PLN</button>
        <button class="btn">RAD</button>
        <button class="btn" onclick="setPage('FUEL')">FUEL</button>
        <button class="btn">SEC</button>
        <button class="btn">ATC</button>
        <button class="btn" onclick="setPage('MENU')">MENU</button>
    </div>

    <div class="lower">
        <div>
            <div class="arrow-pad">
                <button class="btn btn-key" onclick="key('↑')">↑</button>
                <button class="btn btn-key" onclick="key('↓')">↓</button>
                <button class="btn btn-key" onclick="key('←')">←</button>
                <button class="btn btn-key" onclick="key('→')">→</button>
            </div>
            <div class="num-pad">
                <button class="btn btn-key" onclick="key('1')">1</button><button class="btn btn-key" onclick="key('2')">2</button><button class="btn btn-key" onclick="key('3')">3</button>
                <button class="btn btn-key" onclick="key('4')">4</button><button class="btn btn-key" onclick="key('5')">5</button><button class="btn btn-key" onclick="key('6')">6</button>
                <button class="btn btn-key" onclick="key('7')">7</button><button class="btn btn-key" onclick="key('8')">8</button><button class="btn btn-key" onclick="key('9')">9</button>
                <button class="btn btn-key" onclick="key('.')">.</button><button class="btn btn-key" onclick="key('0')">0</button><button class="btn btn-key" onclick="key('/')">/</button>
            </div>
        </div>
        <div class="alpha-pad" id="alpha-btns"></div>
    </div>
</div>

<!-- SimBrief panel -->
<div class="panel">
    <div class="panel-title">SIMBRIEF UPLINK</div>
    <div class="row">
        <input type="text" id="sb-id-input" placeholder="SimBrief username or pilot ID">
        <button class="panel-btn" onclick="directUplink()">UPLINK</button>
    </div>
    <div class="status" id="sb-status">Enter your SimBrief username or numeric pilot ID</div>
</div>

<!-- Live companion panel -->
<div class="panel">
    <div class="panel-title">LIVE SIM CONNECTION — PC ONLY (MSFS 2020/2024)</div>
    <div class="row">
        <input type="text" id="ws-ip-input" placeholder="PC IP address  e.g. 192.168.1.50">
        <button class="panel-btn" id="ws-btn" onclick="toggleLive()">CONNECT</button>
    </div>
    <div class="status" id="ws-status">Xbox users: SimBrief uplink only — live connection not available on console</div>
</div>

<script>
    let pad = "", page = "MENU";
    let flight = {
        fromTo: "____/____", fltNo: "______", costIdx: "---", crzAlt: "_____/---°",
        fuel: { block:"---.-", trip:"---.-", altn:"---.-", rteRsv:"---.-", rsvPct:"5.0",
                final:"---.-", extra:"---.-", taxi:"---.-", zfw:"---.-", tow:"---.-", lw:"---.-" }
    };

    // Live sim data — populated by WebSocket when companion is connected
    let live = null;
    let ws = null;
    let wsConnected = false;

    // ── WebSocket / live connection ──────────────────────────────────────────

    function toggleLive() {
        if (wsConnected) {
            disconnectLive();
        } else {
            connectLive();
        }
    }

    function connectLive() {
        const ip = document.getElementById('ws-ip-input').value.trim();
        if (!ip) { setWsStatus('Enter your PC\'s IP address first', '#ff9d00'); return; }

        setWsStatus('Connecting...', '#00ffff');

        try {
            ws = new WebSocket(`ws://${ip}:8765`);
        } catch (e) {
            setWsStatus('Invalid IP address', '#ff4444');
            return;
        }

        ws.onopen = () => {
            wsConnected = true;
            document.getElementById('ws-btn').textContent = 'DISCONNECT';
            document.getElementById('ws-btn').classList.add('active');
            document.getElementById('live-dot').classList.add('connected');
            setWsStatus(`Connected to ${ip}:8765 — receiving live sim data`, '#00ff00');
            draw();
        };

        ws.onmessage = (evt) => {
            try {
                const data = JSON.parse(evt.data);
                if (data.connected) {
                    live = data;
                } else {
                    live = null;
                    setWsStatus('Companion connected but sim not running', '#ff9d00');
                }
                // If on a live page, redraw with new data
                if (['PROG', 'FUEL'].includes(page)) draw();
            } catch (e) {}
        };

        ws.onclose = () => {
            wsConnected = false;
            live = null;
            document.getElementById('ws-btn').textContent = 'CONNECT';
            document.getElementById('ws-btn').classList.remove('active');
            document.getElementById('live-dot').classList.remove('connected');
            setWsStatus('Disconnected — companion app not running?', '#ff4444');
            draw();
        };

        ws.onerror = () => {
            setWsStatus(`Could not connect to ${ip}:8765 — is the companion app running?`, '#ff4444');
        };
    }

    function disconnectLive() {
        if (ws) ws.close();
    }

    function setWsStatus(msg, color) {
        const el = document.getElementById('ws-status');
        el.textContent = msg;
        el.style.color = color || '#aaa';
    }

    // ── SimBrief uplink ──────────────────────────────────────────────────────

    function key(v) {
        if (["SUCCESS","NO FLIGHT","UPLINK ERR","UPLINKING"].includes(pad)) pad = "";
        pad += v; draw();
    }

    function setPage(p) { page = p; draw(); }

    function setStatus(msg, color) {
        const el = document.getElementById('sb-status');
        el.textContent = msg;
        el.style.color = color || '#aaa';
    }

    async function directUplink() {
        const raw = document.getElementById('sb-id-input').value.trim();
        if (!raw) { setStatus('Enter a SimBrief username or pilot ID', '#ff9d00'); return; }

        pad = "UPLINKING"; draw();
        setStatus('Connecting to SimBrief...', '#00ffff');

        const isNumeric = /^\d+$/.test(raw);
        const param = isNumeric ? `userid=${raw}` : `username=${raw}`;
        const url = `https://www.simbrief.com/api/xml.fetcher.php?${param}&json=1`;

        try {
            const response = await fetch(url);
            if (!response.ok) throw new Error(`HTTP ${response.status}`);
            const d = await response.json();

            if (d.fetch && d.fetch.status === 'Error') {
                pad = "NO FLIGHT";
                setStatus('No active flight plan found for this user', '#ff9d00');
                draw(); return;
            }
            if (!d.origin || !d.destination) throw new Error('Missing flight data');

            flight.fromTo  = `${d.origin.icao_code}/${d.destination.icao_code}`.toUpperCase();
            flight.fltNo   = `${d.general.icao_airline}${d.general.flight_number}`.toUpperCase();
            flight.costIdx = d.general.costindex ?? d.general.cost_index ?? '---';
            const fl = Math.round(parseInt(d.general.initial_altitude) / 100);
            flight.crzAlt  = `FL${fl}/---°`;

            const kg = (v) => v ? (parseInt(v) / 1000).toFixed(1) : '---.-';
            const f = d.fuel || {};
            flight.fuel.block  = kg(f.plan_ramp);
            flight.fuel.trip   = kg(f.plan_trip);
            flight.fuel.altn   = kg(f.plan_altn);
            flight.fuel.rteRsv = kg(f.plan_contingency);
            flight.fuel.rsvPct = f.cont_rule ? parseFloat(f.cont_rule).toFixed(1) : '5.0';
            flight.fuel.final  = kg(f.plan_reserve);
            flight.fuel.extra  = kg(f.plan_extra);
            flight.fuel.taxi   = kg(f.plan_taxi);
            flight.fuel.zfw    = kg(d.weights ? d.weights.est_zfw : null);
            flight.fuel.tow    = kg(d.weights ? d.weights.est_tow : null);
            flight.fuel.lw     = kg(d.weights ? d.weights.est_ldw : null);

            pad = "SUCCESS";
            setStatus(`Uplinked: ${flight.fltNo}  ${flight.fromTo}`, '#00ff00');

        } catch (e) {
            pad = "UPLINK ERR";
            setStatus(e.message.includes('fetch') ? 'Network error — check browser allows cross-origin' : `Error: ${e.message}`, '#ff4444');
            console.error('SimBrief uplink failed:', e);
        }
        draw();
    }

    // ── LSK handling ─────────────────────────────────────────────────────────

    function pressLSK(id) {
        // MENU navigation
        if (page === 'MENU') {
            if (id === 'L1') setPage('INIT');
            if (id === 'L2') setPage('ATSU');
            if (id === 'L3') setPage('AIDS');
            if (id === 'L4') setPage('CFDS');
            if (id === 'L6') setPage('SATCOM');
        }

        // INIT data entry
        if (page === 'INIT') {
            if (!pad || ["SUCCESS","NO FLIGHT","UPLINK ERR","UPLINKING"].includes(pad)) return;
            if (id === 'R1') flight.fromTo = pad;
            if (id === 'L3') flight.fltNo  = pad;
            if (id === 'L4') flight.costIdx = pad;
            if (id === 'L5') flight.crzAlt  = pad;
            pad = "";
        }

        // ATSU — AOC subpage navigation
        if (page === 'ATSU') {
            if (id === 'L1') setPage('ATSU_AOC');
            if (id === 'L2') setPage('ATSU_ATC');
            if (id === 'R6') setPage('MENU');
        }
        if (page === 'ATSU_AOC') {
            if (id === 'L1') atsuRequestOFP();
            if (id === 'L2') atsuRequestWX();
            if (id === 'R6') setPage('ATSU');
        }
        if (page === 'ATSU_ATC') {
            if (id === 'R6') setPage('ATSU');
        }

        // AIDS subpages
        if (page === 'AIDS') {
            if (id === 'L1') setPage('AIDS_ENG');
            if (id === 'L2') setPage('AIDS_APU');
            if (id === 'R6') setPage('MENU');
        }
        if (page === 'AIDS_ENG' || page === 'AIDS_APU') {
            if (id === 'R6') setPage('AIDS');
        }

        // CFDS subpages
        if (page === 'CFDS') {
            if (id === 'L1') setPage('CFDS_LLR');
            if (id === 'L2') setPage('CFDS_PFR');
            if (id === 'L3') setPage('CFDS_SYS');
            if (id === 'R6') setPage('MENU');
        }
        if (page === 'CFDS_LLR' || page === 'CFDS_PFR' || page === 'CFDS_SYS') {
            if (id === 'R6') setPage('CFDS');
        }

        // SATCOM
        if (page === 'SATCOM') {
            if (id === 'R6') setPage('MENU');
        }

        draw();
    }

    // ── ATSU actions ──────────────────────────────────────────────────────────

    let atsuMsg = "";
    let atsuWxMsg = "";

    async function atsuRequestOFP() {
        const raw = document.getElementById('sb-id-input').value.trim();
        if (!raw) { atsuMsg = "NO PILOT ID"; draw(); return; }
        atsuMsg = "REQUESTING...";
        draw();
        try {
            const isNumeric = /^\d+$/.test(raw);
            const param = isNumeric ? `userid=${raw}` : `username=${raw}`;
            const url = `https://www.simbrief.com/api/xml.fetcher.php?${param}&json=1`;
            const response = await fetch(url);
            if (!response.ok) throw new Error(`HTTP ${response.status}`);
            const d = await response.json();
            if (d.fetch && d.fetch.status === 'Error') { atsuMsg = "NO OFP FOUND"; draw(); return; }
            if (!d.origin || !d.destination) throw new Error('Bad data');
            // Load into flight object (same as direct uplink)
            flight.fromTo  = `${d.origin.icao_code}/${d.destination.icao_code}`.toUpperCase();
            flight.fltNo   = `${d.general.icao_airline}${d.general.flight_number}`.toUpperCase();
            flight.costIdx = d.general.costindex ?? d.general.cost_index ?? '---';
            const fl = Math.round(parseInt(d.general.initial_altitude) / 100);
            flight.crzAlt  = `FL${fl}/---°`;
            const kg = (v) => v ? (parseInt(v) / 1000).toFixed(1) : '---.-';
            const f = d.fuel || {};
            flight.fuel.block  = kg(f.plan_ramp);
            flight.fuel.trip   = kg(f.plan_trip);
            flight.fuel.altn   = kg(f.plan_altn);
            flight.fuel.rteRsv = kg(f.plan_contingency);
            flight.fuel.rsvPct = f.cont_rule ? parseFloat(f.cont_rule).toFixed(1) : '5.0';
            flight.fuel.final  = kg(f.plan_reserve);
            flight.fuel.extra  = kg(f.plan_extra);
            flight.fuel.taxi   = kg(f.plan_taxi);
            flight.fuel.zfw    = kg(d.weights ? d.weights.est_zfw : null);
            flight.fuel.tow    = kg(d.weights ? d.weights.est_tow : null);
            flight.fuel.lw     = kg(d.weights ? d.weights.est_ldw : null);
            // Store extra ATSU fields
            flight.atsu = {
                depIcao:  d.origin.icao_code,
                arrIcao:  d.destination.icao_code,
                altnIcao: d.alternate ? d.alternate.icao_code : '----',
                depTime:  d.times ? d.times.sched_out : '----',
                arrTime:  d.times ? d.times.sched_in  : '----',
                aircraft: d.aircraft ? d.aircraft.icaocode : '----',
                route:    d.general ? d.general.route : '----',
            };
            atsuMsg = "OFP LOADED";
            setStatus(`Uplinked: ${flight.fltNo}  ${flight.fromTo}`, '#00ff00');
        } catch(e) {
            atsuMsg = "UPLINK FAIL";
        }
        draw();
    }

    async function atsuRequestWX() {
        const dep = flight.atsu ? flight.atsu.depIcao : (flight.fromTo.split('/')[0] || '');
        if (!dep || dep === '____') { atsuWxMsg = "NO DEP ARPT"; draw(); return; }
        atsuWxMsg = "REQUESTING WX...";
        draw();
        try {
            const url = `https://aviationweather.gov/api/data/metar?ids=${dep}&format=json`;
            const r = await fetch(url);
            const data = await r.json();
            if (data && data.length > 0) {
                atsuWxMsg = data[0].rawOb || "NO METAR";
            } else {
                atsuWxMsg = "NO WX DATA";
            }
        } catch(e) {
            atsuWxMsg = "WX UNAVAIL";
        }
        draw();
    }

    // ── Helpers ───────────────────────────────────────────────────────────────

    function fmt(val, decimals = 0, suffix = '') {
        if (val === null || val === undefined) return '---';
        return Number(val).toFixed(decimals) + suffix;
    }

    function hdg(val) {
        if (val === null || val === undefined) return '---';
        return String(Math.round(val)).padStart(3, '0');
    }

    function nc(val, unit = '') {
        // Returns value or NOT CONNECTED placeholder
        if (!wsConnected) return '- - -';
        if (live === null) return '- - -';
        if (val === null || val === undefined) return '---';
        return val + unit;
    }

    function draw() {
        const titles = {
            MENU:'MCDU MENU', FUEL:'FUEL PRED', PROG:'PROG', INIT:'INIT A',
            ATSU:'ATSU', ATSU_AOC:'AOC MENU', ATSU_ATC:'ATC COMM',
            AIDS:'AIDS', AIDS_ENG:'AIDS ENG', AIDS_APU:'AIDS APU',
            CFDS:'CFDS', CFDS_LLR:'LAST LEG RPT', CFDS_PFR:'POST FLT RPT', CFDS_SYS:'SYS RPT/TEST',
            SATCOM:'SATCOM'
        };
        document.getElementById('title-text').innerText = titles[page] || page;
        // On AOC page, show WX in scratchpad if available
        if (page === 'ATSU_AOC' && atsuWxMsg) {
            document.getElementById('scratchpad').innerText = atsuWxMsg.slice(0, 28);
        } else {
            document.getElementById('scratchpad').innerText = pad;
        }

        if (page === "MENU") {
            setRow(1, "", "", "&lt;FMGC", "REQ>", "G", "W");
            setRow(2, "", "", "&lt;ATSU", "", "G", "");
            setRow(3, "", "", "&lt;AIDS", "", "G", "");
            setRow(4, "", "", "&lt;CFDS", "", "G", "");
            setRow(5, "", "", "", "", "", "");
            setRow(6, "", "", "&lt;SATCOM", "", "G", "");

        } else if (page === "INIT") {
            setRow(1, "CO RTE", "FROM/TO",   "NONE",       flight.fromTo, "W", "C");
            setRow(2, "ALTN/CO RTE", "INIT", "NONE",       "REQUEST*",    "W", "A");
            setRow(3, "FLT NBR", "",          flight.fltNo, "",            "C", "");
            setRow(4, "COST INDEX", "",        flight.costIdx, "",          "C", "");
            setRow(5, "CRZ FL/TEMP", "",       flight.crzAlt, "",           "C", "");
            setRow(6, "TROPO", "",             "36090",      "",            "W", "");

        } else if (page === "FUEL") {
            const fu = flight.fuel;
            const fob = (wsConnected && live) ? live.fuelTonnes : fu.block;
            const fobColor = (wsConnected && live) ? "G" : "C";
            setRow(1, "FOB" + (wsConnected ? " [LIVE]":""), "GW/CG",      fob,                        "---.-/--.-", fobColor, "G");
            setRow(2, "DEST EFOB", "TIME",                                 fu.trip,                    "----",       "C", "G");
            setRow(3, "ALTN EFOB", "TIME",                                 fu.altn,                    "----",       "C", "G");
            setRow(4, "RTE RSV/%", "",                                     `${fu.rteRsv}/${fu.rsvPct}`, "",          "C", "");
            setRow(5, "FINAL/TIME", "MIN DEST FOB",                        fu.final + "/0030",         "---.-",      "C", "A");
            setRow(6, "EXTRA/TIME", "ZFW",                                 fu.extra + "/----",         fu.zfw,       "G", "C");

        } else if (page === "PROG") {
            if (!wsConnected || !live) {
                setRow(1, "AIRSPEED", "ALTITUDE",  "NOT",   "CONNECTED", "A", "A");
                setRow(2, "HDG", "V/S",            "NOT",   "CONNECTED", "A", "A");
                setRow(3, "FOB", "",               "NOT CONNECTED", "",  "A", "");
                setRow(4, "AP ALT", "AP HDG",      "NOT",   "CONNECTED", "A", "A");
                setRow(5, "AP SPD", "AP",          "NOT",   "CONNECTED", "A", "A");
                setRow(6, "ENG 1 N1", "ENG 2 N1", "NOT",   "CONNECTED", "A", "A");
            } else {
                const L = live;
                const apOn = L.apMaster ? "AP ON" : "AP OFF";
                const apColor = L.apMaster ? "G" : "A";
                const vsStr = (L.vs >= 0 ? "+" : "") + Math.round(L.vs);
                setRow(1, "AIRSPEED", "ALTITUDE",  fmt(L.ias,0,"KT"),       fmt(L.altitude,0,"FT"),  "G", "G");
                setRow(2, "HDG", "V/S",            hdg(L.heading)+"°",      vsStr+"FPM",             "G", "G");
                setRow(3, "FOB [LIVE]", "",         L.fuelTonnes+"T",        "",                      "G", "");
                setRow(4, "AP ALT", "AP HDG",       fmt(L.apAltitude,0,"FT"),hdg(L.apHeading)+"°",   "C", "C");
                setRow(5, "AP SPD", "",             fmt(L.apSpeed,0,"KT"),   apOn,                    "C", apColor);
                setRow(6, "ENG 1 N1", "ENG 2 N1",  fmt(L.n1Eng1,1,"%"),     fmt(L.n1Eng2,1,"%"),     "G", "G");
            }

        // ── ATSU ──────────────────────────────────────────────────────────────
        } else if (page === "ATSU") {
            setRow(1, "", "",        "&lt;AOC MENU",  "",       "G", "");
            setRow(2, "", "",        "&lt;ATC COMM",  "",       "G", "");
            setRow(3, "", "",        "",               "",       "",  "");
            setRow(4, "", "",        "",               "",       "",  "");
            setRow(5, "", "",        "",               "",       "",  "");
            setRow(6, "", "",        "",         "RETURN>",      "",  "W");

        } else if (page === "ATSU_AOC") {
            const loaded = flight.atsu ? "C" : "A";
            const ofpLabel = flight.atsu ? `${flight.fromTo}` : "------/------";
            setRow(1, "FLT NBR", "OFP",        "&lt;INIT DATA REQ*", flight.fltNo || "------", "A", loaded);
            setRow(2, "WEATHER", "",            "&lt;WX REQUEST*",    "",                        "G", "");
            setRow(3, "ROUTE", "",              flight.atsu ? flight.fromTo : "------/------", "", loaded, "");
            setRow(4, "DEP TIME", "ARR TIME",
                flight.atsu ? flight.atsu.depTime : "----",
                flight.atsu ? flight.atsu.arrTime : "----",  "C", "C");
            setRow(5, "ALTN", "",               flight.atsu ? flight.atsu.altnIcao : "----", "", "C", "");
            setRow(6, atsuMsg || "", "",         "",               "RETURN>",                     "G", "W");

        } else if (page === "ATSU_ATC") {
            setRow(1, "ACTIVE ATC", "",         "--------",      "",           "A", "");
            setRow(2, "ATC 1", "",              "--------",      "",           "C", "");
            setRow(3, "ATC 2", "",              "--------",      "",           "C", "");
            setRow(4, "", "",                   "",              "",           "",  "");
            setRow(5, "", "DATALINK STATUS",    "",              "STBY",       "",  "A");
            setRow(6, "", "",                   "",              "RETURN>",    "",  "W");

        // ── AIDS ──────────────────────────────────────────────────────────────
        } else if (page === "AIDS") {
            setRow(1, "", "",   "&lt;ENGINE REPORT",  "",   "G", "");
            setRow(2, "", "",   "&lt;APU REPORT",     "",   "G", "");
            setRow(3, "", "",   "",                   "",   "",  "");
            setRow(4, "", "",   "",                   "",   "",  "");
            setRow(5, "", "",   "",                   "",   "",  "");
            setRow(6, "", "",   "",             "RETURN>",  "",  "W");

        } else if (page === "AIDS_ENG") {
            // Use live N1 if available, else SimBrief TOW as proxy
            const e1 = (wsConnected && live) ? fmt(live.n1Eng1,1,"%") : "---.-";
            const e2 = (wsConnected && live) ? fmt(live.n1Eng2,1,"%") : "---.-";
            const egt1 = (wsConnected && live) ? "---°C" : "---°C";
            const src = (wsConnected && live) ? "G" : "A";
            setRow(1, "ENG 1 N1",  "ENG 2 N1",    e1,              e2,              src, src);
            setRow(2, "ENG 1 EGT", "ENG 2 EGT",   egt1,            egt1,            src, src);
            setRow(3, "ENG 1 FF",  "ENG 2 FF",    "---KG/H",       "---KG/H",       src, src);
            setRow(4, "TOW", "",                   flight.fuel.tow+"T", "",          "C", "");
            setRow(5, "ZFW", "",                   flight.fuel.zfw+"T", "",          "C", "");
            setRow(6, "", "",                      "",              "RETURN>",        "",  "W");

        } else if (page === "AIDS_APU") {
            setRow(1, "APU N1",    "",    "---.-",   "",   "A", "");
            setRow(2, "APU EGT",   "",    "---°C",   "",   "A", "");
            setRow(3, "APU FF",    "",    "---KG/H", "",   "A", "");
            setRow(4, "APU HRS",   "",    "------",  "",   "C", "");
            setRow(5, "", "",              "",        "",   "",  "");
            setRow(6, "", "",              "",   "RETURN>",  "",  "W");

        // ── CFDS ──────────────────────────────────────────────────────────────
        } else if (page === "CFDS") {
            setRow(1, "", "",   "&lt;LAST LEG RPT",   "",   "G", "");
            setRow(2, "", "",   "&lt;POST FLT RPT",   "",   "G", "");
            setRow(3, "", "",   "&lt;SYS RPT/TEST",   "",   "G", "");
            setRow(4, "", "",   "",                   "",   "",  "");
            setRow(5, "", "",   "",                   "",   "",  "");
            setRow(6, "", "",   "",             "RETURN>",  "",  "W");

        } else if (page === "CFDS_LLR") {
            // Last leg report — shows flight number and basic status
            const flt = flight.fltNo !== "______" ? flight.fltNo : "NO FLT NBR";
            setRow(1, "FLT NBR", "DATE",     flt,         new Date().toISOString().slice(0,10), "W", "W");
            setRow(2, "SYSTEMS", "",          "NO FAULTS", "",  "G", "");
            setRow(3, "ECAM", "",             "NO WARNINGS","", "G", "");
            setRow(4, "CLASS 1", "",          "NONE",      "",  "G", "");
            setRow(5, "CLASS 2", "",          "NONE",      "",  "G", "");
            setRow(6, "", "",                 "",    "RETURN>", "",  "W");

        } else if (page === "CFDS_PFR") {
            const flt = flight.fltNo !== "______" ? flight.fltNo : "NO FLT NBR";
            const rte = flight.fromTo !== "____/____" ? flight.fromTo : "----/----";
            setRow(1, "FLT NBR", "ROUTE",    flt,          rte,   "W", "W");
            setRow(2, "BLOCK FUEL", "",       flight.fuel.block+"T", "", "C", "");
            setRow(3, "TRIP FUEL",  "",       flight.fuel.trip+"T",  "", "C", "");
            setRow(4, "ZFW", "TOW",           flight.fuel.zfw+"T", flight.fuel.tow+"T", "C", "C");
            setRow(5, "STATUS", "",           "NO FAULTS",  "",    "G", "");
            setRow(6, "", "",                 "",     "RETURN>",   "",  "W");

        } else if (page === "CFDS_SYS") {
            setRow(1, "", "FWC",    "",    "NORMAL",  "", "G");
            setRow(2, "", "FADEC1", "",    "NORMAL",  "", "G");
            setRow(3, "", "FADEC2", "",    "NORMAL",  "", "G");
            setRow(4, "", "FMGC1",  "",    "NORMAL",  "", "G");
            setRow(5, "", "FMGC2",  "",    "NORMAL",  "", "G");
            setRow(6, "", "",       "",    "RETURN>",  "", "W");

        // ── SATCOM ────────────────────────────────────────────────────────────
        } else if (page === "SATCOM") {
            setRow(1, "SATCOM STATUS", "",  "STBY",          "",   "A", "");
            setRow(2, "CHANNEL", "",        "------",        "",   "C", "");
            setRow(3, "GES ID", "",         "------",        "",   "C", "");
            setRow(4, "SIGNAL", "",         "------",        "",   "C", "");
            setRow(5, "DATALINK", "",       "NOT AVAIL",     "",   "A", "");
            setRow(6, "", "",               "",        "RETURN>",  "",  "W");

        } else {
            for (let i = 1; i <= 6; i++) setRow(i, "", "", "", "", "", "");
            setRow(3, "", "PAGE UNDER", "", "CONSTRUCTION", "", "A");
        }
    }

    function setRow(num, l1, l2, v1, v2, c1, c2) {
        document.getElementById('row' + num).innerHTML = `
            <div class="label-row"><span>${l1}</span><span>${l2}</span></div>
            <div class="val-row"><span class="${c1}">${v1}</span><span class="${c2}">${v2}</span></div>
        `;
    }

    // ── Alpha keyboard ────────────────────────────────────────────────────────

    const al = document.getElementById('alpha-btns');
    "ABCDEFGHIJKLMNOPQRSTUVWXYZ".split('').forEach(x => {
        let b = document.createElement('button'); b.className = "btn btn-key"; b.innerText = x;
        b.onclick = () => key(x); al.appendChild(b);
    });
    [["SP"," "],["CLR",""]].forEach(([label]) => {
        let b = document.createElement('button'); b.className = "btn btn-key"; b.innerText = label;
        b.onclick = () => { if (label === 'CLR') { pad = ""; draw(); } else key(" "); };
        al.appendChild(b);
    });

    draw();
</script>
</body>
</html>
